# Run 03: FP16 precision
# Same as GPU baseline but with FP16 weights and activations. Should benefit from Tensor Cores.

run_id: "03_gpu_fp16"
description: "Single GPU FP16 with vanilla attention. Tests Tensor Core utilization."

device: cuda:0
dtype: float16
attention_backend: vanilla
num_gpus: 1
batch_size: 1

prompts_subset: all

warmup_runs: 3
timed_runs: 5

profile: true
nsys_output: "results/nsys_reports/03_gpu_fp16"
