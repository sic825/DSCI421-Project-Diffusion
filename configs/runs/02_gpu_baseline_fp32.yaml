# Run 02: GPU baseline
# Single 2080 Ti, FP32, vanilla attention. The "before" picture for all optimizations.
# All subsequent runs are compared against this as the reference GPU baseline.

run_id: "02_gpu_baseline_fp32"
description: "Single GPU FP32 with vanilla attention. GPU baseline."

device: cuda:0
dtype: float32
attention_backend: vanilla
num_gpus: 1
batch_size: 1

prompts_subset: all

warmup_runs: 3
timed_runs: 5

profile: true
nsys_output: "results/nsys_reports/02_gpu_baseline_fp32"
