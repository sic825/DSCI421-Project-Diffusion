# Run 06: FP16 + xformers
# Same as run 05 but with xformers attention. xformers may or may not beat SDPA
# depending on shapes - this is the empirical question.

run_id: "06_gpu_fp16_xformers"
description: "FP16 with xformers memory-efficient attention."

device: cuda:0
dtype: float16
attention_backend: xformers
num_gpus: 1
batch_size: 1

prompts_subset: all

warmup_runs: 3
timed_runs: 5

profile: true
nsys_output: "results/nsys_reports/06_gpu_fp16_xformers"
