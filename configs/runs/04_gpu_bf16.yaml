# Run 04: BF16 precision
# BF16 has same exponent range as FP32 but reduced mantissa. On 2080 Ti (Turing),
# BF16 is NOT natively accelerated by Tensor Cores - Tensor Core BF16 support starts
# at Ampere (sm_80+). Expect BF16 to be slower than FP16 here. Document this finding.

run_id: "04_gpu_bf16"
description: "Single GPU BF16 with vanilla attention. Will be slower than FP16 on Turing - documents architectural limitation."

device: cuda:0
dtype: bfloat16
attention_backend: vanilla
num_gpus: 1
batch_size: 1

prompts_subset: all

warmup_runs: 3
timed_runs: 5

profile: true
nsys_output: "results/nsys_reports/04_gpu_bf16"
